<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal UPA TIK POLIJE - Admin Tiket</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ADMIN LAYOUT -->
    <div id="admin-layout" style="display: flex;">
        <header class="admin-header">
            <div class="admin-logo" onclick="window.location.href='admin-dashboard.html'">
                <i class="fas fa-layer-group"></i>
                <strong>UPA TIK Admin</strong>
            </div>
            <div class="admin-header-right">
                <div class="admin-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search projects, users...">
                    <span class="slash-key">/</span>
                </div>
                <div class="admin-profile-area">
                    <div class="admin-icons">
                        <i class="fas fa-bell"><span class="badge">4</span></i>
                        <i class="fas fa-comment-alt"><span class="badge">5</span></i>
                    </div>
                    <div class="admin-profile">
                        <img src="https://via.placeholder.com/35" alt="Admin">
                        <div class="profile-text">
                            <strong>John Doe</strong>
                            <span>PRODUCT ADMIN</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="admin-body">
            <aside class="admin-sidebar">
                <ul class="admin-menu">
                    <li onclick="window.location.href='admin-dashboard.html'">
                        <i class="fas fa-th-large"></i> <span>Dashboard</span>
                    </li>
                    <li class="active" onclick="window.location.href='admin-tiket.html'">
                        <i class="fas fa-ticket-alt"></i> <span>Manajemen Tiket</span>
                    </li>
                    <li onclick="window.location.href='admin-pengguna.html'">
                        <i class="fas fa-users"></i> <span>Users</span>
                    </li>
                </ul>
                <div class="menu-label">PRODUCTIVITY APPS</div>
                <ul class="admin-menu">
                    <li><i class="fas fa-calendar-alt"></i> <span>Calendar</span></li>
                    <li><i class="fas fa-columns"></i> <span>Kanban Board</span></li>
                    <li><i class="fas fa-comments"></i> <span>Chat</span></li>
                </ul>
                <div class="admin-sidebar-bottom">
                    <div class="admin-profile">
                        <img src="https://via.placeholder.com/35" alt="Admin">
                        <div class="profile-text">
                            <strong>John Doe</strong>
                            <span>PRODUCT ADMIN</span>
                        </div>
                        <i class="fas fa-cog text-gray" style="margin-left:auto; cursor:pointer;"></i>
                        <i class="fas fa-sign-out-alt text-red" style="margin-left:10px; cursor:pointer;" onclick="logoutUser()"></i>
                    </div>
                </div>
            </aside>

            <main class="admin-content">
                <!-- PAGE: ADMIN TIKET -->
                <section id="page-admin-tiket" class="page active" style="display: block;">
                    <div class="admin-page-header">
                        <h2>Manajemen Tiket Layanan</h2>
                    </div>
                    <div class="admin-card" style="padding: 30px; text-align: center; color: #6b7280;">
                        <i class="fas fa-ticket-alt" style="font-size: 3rem; margin-bottom: 20px; color: #cbd5e1;"></i>
                        <p>Halaman daftar tiket sedang dalam pengembangan...</p>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Check session
        if(sessionStorage.getItem('isLoggedIn') !== 'true' || sessionStorage.getItem('userRole') !== 'admin') {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
